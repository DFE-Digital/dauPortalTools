name: R-Build-Check-and-Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 5 * * 1'

jobs:
  build-and-test:
    # Switching to ubuntu-latest is often safer/faster for CI unless you NEED Mac
    runs-on: ubuntu-latest 
    strategy:
      matrix:
        # Use 'release' to stay on the safe, binary-supported version
        r-version: ['release'] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          # Use Public RSPM (Posit Package Manager) for lightning-fast binaries
          use-public-rspm: true 

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2

      - name: Install System Dependencies
        run: |
          # Linux equivalents for common R dependencies
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev
        shell: bash

      - name: Check and Test
        run: |
          install.packages("rcmdcheck")
          rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}